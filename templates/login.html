<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Caption AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --surface: #0c1120;
            --surface2: #111827;
            --border: rgba(99, 179, 255, 0.12);
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --accent3: #8b5cf6;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blobs */
        .blob-tl {
            position: fixed; top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .blob-br {
            position: fixed; bottom: -150px; right: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(6,182,212,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── CARD ── */
        .login-card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 40px 36px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent3), var(--accent2));
            border-radius: 24px 24px 0 0;
        }

        /* ── LOGO ── */
        .card-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 18px rgba(59,130,246,0.35);
        }

        .logo-name {
            font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-version {
            font-family: 'Space Mono', monospace;
            font-size: 9px; color: var(--muted);
            letter-spacing: 1.5px; text-transform: uppercase;
        }

        /* ── HEADING ── */
        .card-eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; color: var(--accent2);
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 26px; font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 16px; }

        .form-label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--muted);
            margin-bottom: 8px;
        }

        .input-wrap {
            position: relative;
        }

        .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 15px; color: var(--muted);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px 12px 42px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .form-input::placeholder { color: var(--muted); }

        /* Password toggle */
        .pw-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--muted); cursor: pointer;
            font-size: 15px; padding: 0;
            transition: color 0.2s;
        }

        .pw-toggle:hover { color: var(--text); }

        /* ── OPTIONS ROW ── */
        .options-row {
            display: flex; align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .remember-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--muted); cursor: pointer;
        }

        .remember-label input[type="checkbox"] {
            width: 15px; height: 15px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .forgot-link {
            font-family: 'Space Mono', monospace;
            font-size: 11px; color: var(--accent2);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-link:hover { color: var(--accent); }

        /* ── BUTTONS ── */
        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, var(--accent), var(--accent3));
            color: white; border: none;
            border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(59,130,246,0.3);
            transition: opacity 0.2s, transform 0.2s;
            margin-bottom: 14px;
        }

        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px;
        }

        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--border);
        }

        .divider span {
            font-family: 'Space Mono', monospace;
            font-size: 10px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-google {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .btn-google:hover {
            border-color: rgba(99,179,255,0.25);
            background: rgba(255,255,255,0.04);
        }

        .btn-google img {
            width: 18px; height: 18px;
        }

        /* ── FOOTER ── */
        .card-footer-text {
            text-align: center;
            font-size: 13px; color: var(--muted);
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .card-footer-text a {
            color: var(--accent2); text-decoration: none; font-weight: 700;
            transition: color 0.2s;
        }

        .card-footer-text a:hover { color: var(--accent); }

        /* ── BOTTOM BRAND ── */
        .page-footer {
            position: fixed; bottom: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 10px; color: var(--muted);
            letter-spacing: 2px; text-transform: uppercase;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="blob-tl"></div>
<div class="blob-br"></div>

<div class="login-card">

    <!-- Logo -->
    <div class="card-logo">
        <div class="logo-icon">♾️</div>
        <div>
            <div class="logo-name">Caption AI</div>
            <div class="logo-version">v2.0 · Pro</div>
        </div>
    </div>

    <!-- Heading -->
    <div class="card-eyebrow">Welcome back</div>
    <div class="card-title">Sign in to your account</div>

    <!-- Form -->
    <form method="POST">

        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input class="form-input" type="text" name="username"
                       placeholder="Enter your username" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input class="form-input" type="password" name="password"
                       id="passwordInput" placeholder="Enter your password" required>
                <button type="button" class="pw-toggle" onclick="togglePassword()">👁️</button>
            </div>
        </div>

        <div class="options-row">
            <label class="remember-label">
                <input type="checkbox"> Remember for 30 days
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary">✦ Sign In</button>

    </form>

    <!-- <div class="divider"><span>or continue with</span></div>

    <button class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Sign in with Google
    </button> -->

    <div class="card-footer-text">
        Don't have an account? <a href="/signup">Create account →</a>
    </div>

</div>

<!-- <div class="page-footer">Caption AI · Secure Login</div> -->

<script>
    function togglePassword() {
        const input = document.getElementById('passwordInput');
        const btn = document.querySelector('.pw-toggle');
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁️';
        }
    }
</script>

</body>
</html>
