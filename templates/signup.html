<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Caption AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050810;
            --surface: #0c1120;
            --surface2: #111827;
            --border: rgba(99, 179, 255, 0.12);
            --accent: #3b82f6;
            --accent2: #06b6d4;
            --accent3: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px 16px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .blob-tl {
            position: fixed; top: -150px; left: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(139,92,246,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .blob-br {
            position: fixed; bottom: -150px; right: -150px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        /* ── CARD ── */
        .signup-card {
            position: relative; z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px 40px 36px;
            width: 100%; max-width: 440px;
            animation: slideUp 0.5s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .signup-card::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent3), var(--accent), var(--accent2));
            border-radius: 24px 24px 0 0;
        }

        /* ── LOGO ── */
        .card-logo {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 28px;
        }

        .logo-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent3), var(--accent));
            border-radius: 11px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 18px rgba(139,92,246,0.35);
        }

        .logo-name {
            font-size: 18px; font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-version {
            font-family: 'Space Mono', monospace;
            font-size: 9px; color: var(--muted);
            letter-spacing: 1.5px; text-transform: uppercase;
        }

        /* ── HEADING ── */
        .card-eyebrow {
            font-family: 'Space Mono', monospace;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 2px; color: var(--accent2);
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 26px; font-weight: 800;
            letter-spacing: -0.5px; margin-bottom: 28px;
        }

        /* ── FORM ── */
        .form-group { margin-bottom: 14px; }

        .form-label {
            display: block;
            font-family: 'Space Mono', monospace;
            font-size: 10px; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--muted);
            margin-bottom: 7px;
        }

        .input-wrap { position: relative; }

        .input-icon {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 15px; color: var(--muted);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px 12px 42px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 14px; outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }

        .form-input.valid {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(16,185,129,0.08);
        }

        .form-input.invalid {
            border-color: var(--danger);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.08);
        }

        .form-input::placeholder { color: var(--muted); }

        .pw-toggle {
            position: absolute; right: 14px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: var(--muted); cursor: pointer;
            font-size: 15px; padding: 0;
            transition: color 0.2s;
        }

        .pw-toggle:hover { color: var(--text); }

        /* Password strength bar */
        .pw-strength {
            margin-top: 6px; display: none;
        }

        .pw-strength-bar {
            height: 3px; border-radius: 2px;
            background: var(--surface2);
            overflow: hidden; margin-bottom: 4px;
        }

        .pw-strength-fill {
            height: 100%; border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }

        .pw-strength-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px; color: var(--muted);
        }

        /* Match indicator */
        .match-hint {
            font-family: 'Space Mono', monospace;
            font-size: 10px; margin-top: 5px;
            display: none;
        }

        /* ── TERMS ── */
        .terms-row {
            display: flex; align-items: flex-start; gap: 10px;
            margin-bottom: 20px; margin-top: 6px;
        }

        .terms-row input[type="checkbox"] {
            width: 15px; height: 15px; margin-top: 2px;
            accent-color: var(--accent); cursor: pointer; flex-shrink: 0;
        }

        .terms-text {
            font-size: 12px; color: var(--muted); line-height: 1.5;
        }

        .terms-text a {
            color: var(--accent2); text-decoration: none;
        }

        .terms-text a:hover { text-decoration: underline; }

        /* ── BUTTONS ── */
        .btn-primary {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, var(--accent3), var(--accent));
            color: white; border: none; border-radius: 12px;
            font-family: 'Syne', sans-serif;
            font-size: 15px; font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(139,92,246,0.3);
            transition: opacity 0.2s, transform 0.2s;
            margin-bottom: 14px;
        }

        .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }

        .divider {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 14px;
        }

        .divider::before, .divider::after {
            content: ''; flex: 1;
            height: 1px; background: var(--border);
        }

        .divider span {
            font-family: 'Space Mono', monospace;
            font-size: 10px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 1px;
        }

        .btn-google {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 24px;
        }

        .btn-google:hover {
            border-color: rgba(99,179,255,0.25);
            background: rgba(255,255,255,0.04);
        }

        .btn-google img { width: 18px; height: 18px; }

        /* ── FOOTER ── */
        .card-footer-text {
            text-align: center;
            font-size: 13px; color: var(--muted);
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .card-footer-text a {
            color: var(--accent2); text-decoration: none; font-weight: 700;
            transition: color 0.2s;
        }

        .card-footer-text a:hover { color: var(--accent); }

        .page-footer {
            position: fixed; bottom: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 10px; color: var(--muted);
            letter-spacing: 2px; text-transform: uppercase;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="blob-tl"></div>
<div class="blob-br"></div>

<div class="signup-card">

    <!-- Logo -->
    <div class="card-logo">
        <div class="logo-icon">♾️</div>
        <div>
            <div class="logo-name">Caption AI</div>
            <div class="logo-version">v2.0 · Pro</div>
        </div>
    </div>

    <!-- Heading -->
    <div class="card-eyebrow">Get started for free</div>
    <div class="card-title">Create your account</div>

    <!-- Form -->
    <form method="POST" id="signupForm">

        <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrap">
                <span class="input-icon">👤</span>
                <input class="form-input" type="text" name="username"
                       id="usernameInput"
                       placeholder="Choose a username" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-wrap">
                <span class="input-icon">✉️</span>
                <input class="form-input" type="email" name="email"
                       id="emailInput"
                       placeholder="you@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔒</span>
                <input class="form-input" type="password" name="password"
                       id="passwordInput"
                       placeholder="Create a strong password" required
                       oninput="checkStrength(this.value)">
                <button type="button" class="pw-toggle" onclick="togglePw('passwordInput', this)">👁️</button>
            </div>
            <div class="pw-strength" id="pwStrength">
                <div class="pw-strength-bar">
                    <div class="pw-strength-fill" id="pwFill"></div>
                </div>
                <span class="pw-strength-label" id="pwLabel">Weak</span>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <div class="input-wrap">
                <span class="input-icon">🔐</span>
                <input class="form-input" type="password" name="confirm_password"
                       id="confirmInput"
                       placeholder="Re-enter your password" required
                       oninput="checkMatch()">
                <button type="button" class="pw-toggle" onclick="togglePw('confirmInput', this)">👁️</button>
            </div>
            <div class="match-hint" id="matchHint"></div>
        </div>

        <div class="terms-row">
            <input type="checkbox" id="termsCheck" required>
            <label class="terms-text" for="termsCheck">
                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
            </label>
        </div>

        <button type="submit" class="btn-primary">✦ Create Account</button>

    </form>

<script>
    function togglePw(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁️';
        }
    }

    function checkStrength(val) {
        const bar = document.getElementById('pwStrength');
        const fill = document.getElementById('pwFill');
        const label = document.getElementById('pwLabel');

        bar.style.display = val.length > 0 ? 'block' : 'none';

        let score = 0;
        if (val.length >= 8) score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const levels = [
            { w: '25%', color: '#ef4444', text: 'Weak' },
            { w: '50%', color: '#f59e0b', text: 'Fair' },
            { w: '75%', color: '#3b82f6', text: 'Good' },
            { w: '100%', color: '#10b981', text: 'Strong 💪' },
        ];

        const lvl = levels[Math.max(0, score - 1)] || levels[0];
        fill.style.width = lvl.w;
        fill.style.background = lvl.color;
        label.textContent = lvl.text;
        label.style.color = lvl.color;
    }

    function checkMatch() {
        const pw = document.getElementById('passwordInput').value;
        const cf = document.getElementById('confirmInput').value;
        const hint = document.getElementById('matchHint');
        const input = document.getElementById('confirmInput');

        hint.style.display = cf.length > 0 ? 'block' : 'none';

        if (cf.length === 0) return;

        if (pw === cf) {
            hint.textContent = '✅ Passwords match';
            hint.style.color = '#10b981';
            input.classList.remove('invalid');
            input.classList.add('valid');
        } else {
            hint.textContent = '❌ Passwords do not match';
            hint.style.color = '#ef4444';
            input.classList.remove('valid');
            input.classList.add('invalid');
        }
    }
</script>

</body>
</html>
